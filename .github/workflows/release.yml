name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create plugin zip
        run: |
          mkdir -p staging/addons/GodotTogether
          cp -r src plugin.cfg LICENSE staging/addons/GodotTogether/
          cd staging
          zip -r ../GodotTogether-${{ github.ref_name }}.zip addons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: GodotTogether-${{ github.ref_name }}.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
